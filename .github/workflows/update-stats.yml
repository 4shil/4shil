name: Update contribution stats

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Fetch contribution stats
        id: stats
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          YESTERDAY=$(date -u -d "yesterday" +%Y-%m-%d)

          RESPONSE=$(curl -s -H "Authorization: bearer $GH_TOKEN" \
            -H "Content-Type: application/json" \
            -X POST https://api.github.com/graphql \
            -d "{\"query\":\"{ user(login: \\\"4shil\\\") { contributionsCollection(from: \\\"2026-01-02T00:00:00Z\\\") { contributionCalendar { totalContributions weeks { contributionDays { contributionCount } } } } } }\"}")

          TOTAL=$(echo $RESPONSE | python3 -c "import sys,json; d=json.load(sys.stdin); print(d['data']['user']['contributionsCollection']['contributionCalendar']['totalContributions'])")
          ACTIVE=$(echo $RESPONSE | python3 -c "import sys,json; d=json.load(sys.stdin); days=[day for week in d['data']['user']['contributionsCollection']['contributionCalendar']['weeks'] for day in week['contributionDays'] if day['contributionCount']>0]; print(len(days))")

          echo "total=$TOTAL" >> $GITHUB_OUTPUT
          echo "active=$ACTIVE" >> $GITHUB_OUTPUT
          echo "yesterday=$YESTERDAY" >> $GITHUB_OUTPUT

      - name: Update README badges
        run: |
          ACTIVE="${{ steps.stats.outputs.active }}"
          TOTAL="${{ steps.stats.outputs.total }}"
          YESTERDAY="${{ steps.stats.outputs.yesterday }}"
          sed -i "s|Active_Days_since_Jan_2-[0-9]*_days|Active_Days_since_Jan_2-${ACTIVE}_days|g" README.md
          sed -i "s|Contributions_since_Jan_2-[0-9]*_commits|Contributions_since_Jan_2-${TOTAL}_commits|g" README.md
          sed -E -i "s|(github-readme-activity-graph\.vercel\.app/graph[^\" ]*username=4shil[^\" ]*)&to=[0-9]{4}-[0-9]{2}-[0-9]{2}|\1\&to=${YESTERDAY}|g" README.md

      - name: Commit if changed
        run: |
          git config user.name "4shil"
          git config user.email "166588383+4shil@users.noreply.github.com"
          git diff --quiet && echo "No changes" || (git add README.md && git commit -m "Update contribution stats $(date +%Y-%m-%d)" && git push)
